name: 💻 Usage / Help
description: Get help using the simulator or understanding configuration
title: "[Usage]: "
labels: ["usage"]

body:
- type: markdown
  attributes:
    value: >
      #### Please check the [documentation](https://github.com/your-org/light-llm-simulator/tree/main/docs) and [examples](https://github.com/your-org/light-llm-simulator/tree/main/examples) first.
- type: textarea
  attributes:
    label: Your environment
    description: |
      Please provide:
      - Python version
      - Model and hardware you're trying to simulate
    value: |
      ```
      Python version: 3.x.x
      Model type: DeepSeek V3 / Qwen3-235B / Other
      Hardware: Ascend / Nvidia / Other
      ```
    validations:
    required: true
- type: textarea
  attributes:
    label: What are you trying to do?
    description: |
      Describe what you want to accomplish with the simulator.

      Examples:
      - "I want to find optimal AFD configuration for DeepSeek V3 on Ascend A3Pod"
      - "I need to understand how to configure TPOT and KV cache length for my use case"
      - "I'm trying to add a new model but don't know where to start"
    placeholder: |
      I want to run a simulation for [model] on [hardware] to find the best [AFD/DeepEP] configuration.
    validations:
    required: true
- type: textarea
  attributes:
    label: What have you tried?
    description: |
      Share commands you've run or configurations you've tried:
    value: |
      ```bash
      python examples/deepseek/afd.py --tpot 50 --kv_len 4096
      ```
    validations:
    required: false
- type: textarea
  attributes:
    label: Error or unexpected behavior (if any)
    description: |
      If you're encountering an error, paste the full message and traceback here.
    validations:
    required: false
- type: markdown
  attributes:
    value: |
      Thanks for asking! 🙏
