name: ⚡ Performance discussion
description: Discuss simulator accuracy, optimizations, or performance modeling
title: "[Performance]: "
labels: ["performance"]

body:
- type: markdown
  attributes:
    value: >
      #### Before submitting, please check existing [issues](https://github.com/your-org/light-llm-simulator/issues?q=is%3Aissue+label%3Aperformance+sort%3Acreated-desc+).
- type: textarea
  attributes:
    label: 🎯 Topic
    description: >
      What aspect of the simulator's performance or accuracy do you want to discuss?

      Examples:
      - Simulator accuracy vs real-world measurements
      - Optimizing search algorithm efficiency
      - Improving operator cost models
    validations:
    required: false
- type: textarea
  attributes:
    label: Proposed improvement
    description: >
      Do you have a specific proposal to improve the simulator's performance or accuracy?
    validations:
    required: false
- type: textarea
  attributes:
    label: Accuracy concern
    description: >
      If you believe the simulator is producing inaccurate results, please provide:

      - Your configuration (model, hardware, parameters)
      - Expected vs actual results
      - Real-world measurements if available
    validations:
    required: false
- type: textarea
  attributes:
    label: Additional context
    description: >
      Any supporting data, charts, or links to relevant papers or benchmarks.
    validations:
    required: false
- type: markdown
  attributes:
    value: |
      Thanks for contributing! 🚀
