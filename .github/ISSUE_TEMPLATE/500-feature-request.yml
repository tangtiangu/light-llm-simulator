name: 🚀 Feature request
description: Suggest a new feature or enhancement for the simulator
title: "[Feature]: "
labels: ["feature request"]

body:
- type: markdown
  attributes:
    value: >
      #### Before submitting, please check existing [issues](https://github.com/your-org/light-llm-simulator/issues?q=is%3Aissue+sort%3Acreated-desc+) and pull requests.
- type: textarea
  attributes:
    label: 🚀 Feature description
    description: >
      A clear and concise description of the feature. What problem does it solve?

      Example: "I want to add support for [new model] so I can evaluate its performance on [hardware]."
    validations:
    required: true
- type: textarea
  attributes:
    label: Motivation
    description: >
      Why is this feature important? How would it benefit users?
    validations:
    required: false
- type: textarea
  attributes:
    label: Proposed implementation
    description: >
      How do you envision this being implemented?

      - For new models: Reference the model architecture and any similar models already supported
      - For new hardware: Provide vendor-published specs and target deployment scenarios
      - For new operators: Describe the operation's compute/memory characteristics
    validations:
    required: false
- type: textarea
  attributes:
    label: Alternatives considered
    description: >
      Have you considered other approaches or workarounds?
    validations:
    required: false
- type: markdown
  attributes:
    value: |
      Thanks for contributing! 🎉
