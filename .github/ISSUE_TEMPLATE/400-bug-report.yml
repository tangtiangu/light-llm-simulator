name: 🐛 Bug report
description: Report a bug or unexpected behavior in the simulator
title: "[Bug]: "
labels: ["bug"]

body:
- type: markdown
  attributes:
    value: >
      #### Before submitting an issue, please search existing [issues](https://github.com/your-org/light-llm-simulator/issues?q=is%3Aissue+sort%3Acreated-desc+) to avoid duplicates.
- type: markdown
  attributes:
    value: |
      ⚠️ **SECURITY WARNING:** Please review any text you paste to ensure it does not contain sensitive information.
- type: textarea
  attributes:
    label: Your environment
    description: |
      Please provide the following information:
      - Python version
      - Model type and hardware used
      - Operating system
    value: |
      ```
      Python version: 3.x.x
      Model type: DeepSeek V3 / Qwen3-235B
      Hardware: Ascend_A3Pod / Nvidia_H100SXM
      OS: Linux/macOS/Windows
      ```
    validations:
    required: true
- type: textarea
  attributes:
    label: 🐛 Describe the bug
    description: |
      A clear and concise description of the bug.

      If applicable, provide a minimal example to reproduce the issue:

      ```bash
      python examples/deepseek/afd.py --tpot 50 --kv_len 4096
      ```

      Include the error message and full traceback:

      ```
      Traceback (most recent call last):
        ...
      ```

      Describe expected vs actual behavior.
    placeholder: |
      A clear description of what the bug is and how to reproduce it.
  validations:
    required: true
- type: textarea
  attributes:
    label: Configuration used
    description: |
      If applicable, share the configuration parameters you used:
    placeholder: |
      TPOT target: 50ms
      KV cache length: 4096
      Serving mode: AFD / DeepEP
      Number of dies: X
  validations:
    required: false
- type: markdown
  attributes:
    value: |
      Thanks for reporting! 🙏
