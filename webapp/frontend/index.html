<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Light LLM Simulator - Web UI</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
      body {
          font-family: Arial, sans-serif;
          margin: 20px;
          background-color: #f7f7f7;
          color: #333;
      }
      h2, h3 { color: #007bff; }
      #container { 
        display: flex;
        overflow-x: auto;
        flex-wrap: nowrap;
        align-items: stretch;
        justify-content: flex-start;
      }

      .form_field {
        margin: 20px 0;
      }

      #experiment_box { flex: 0 0 200px; padding: 20px; background-color: #fff; border: 1px solid #ccc; border-radius: 5px; margin: 10px; align-items: stretch; }
      #config_box { flex: 0 0 300px; padding: 20px; background-color: #fff; border: 1px solid #ccc; border-radius: 5px; margin: 10px; align-items: stretch; }
      #csv_results_box { flex: 0 0 300px; padding: 20px; background-color: #fff; border: 1px solid #ccc; border-radius: 5px; margin: 10px; align-items: stretch; }
      #throughput_box { flex: 0 0 700px; padding: 20px; background-color: #fff; border: 1px solid #ccc; border-radius: 5px; margin: 10px; align-items: stretch; }
      #pipeline_box { flex: 0 0 700px; padding: 20px; background-color: #fff; border: 1px solid #ccc; border-radius: 5px; margin: 10px; align-items: stretch; }
      .field { margin-bottom: 10px; padding: 6px; background: #fff; border-radius: 5px; display: flex; flex-direction: column; }
      label { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
      input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
      button { width: auto; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
      button:hover { background-color: #0056b3; }
      #throughput_images img { max-width: 100%; display: block; margin: 10px auto; }
      #pipeline_images img { max-width: 100%; display: block; margin: 10px auto; }
      #throughput_message { display: block; }
      #pipeline_message { display: block; }
      table { border-collapse: collapse; width: 100%; }
      th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
      th { background: #f2f2f2; }
      .img-card { border: 1px dashed #e0e0e0; padding: 8px; margin-bottom: 12px; border-radius: 6px; background: #fafafa; }
      .img-placeholder { color: #666; font-size: 14px; padding: 24px 8px; text-align: center; }
      .result-img { display: block; max-width: 100%; height: auto; margin: 0 auto; }
      .img-missing { color: #a94442; background: #fff2f0; border: 1px solid #f1c0bf; padding: 12px; border-radius: 6px; font-size: 14px; }
      .img-missing .img-url { margin-top: 6px; font-size: 12px; color: #666; word-break: break-all; }
  </style>
</head>
<body>
  <div id="container">
    <div id="experiment_box">
      <h2>Run Experiment</h2>
        <div id="form">
          <div class="field">
            <label for="serving_mode">serving_mode</label>
            <select id="serving_mode"><option value="AFD">AFD</option><option value="DeepEP">DeepEP</option></select>
          </div>
          <div class="field">
            <label for="model_type">model_type</label>
            <select id="model_type">
              <option value="deepseek-ai/DeepSeek-V3">DeepSeekV3</option>
              <option value="Qwen/Qwen3-235B-A22B">Qwen3-235B-A22B</option>
              <option value="deepseek-ai/DeepSeek-V2-Lite">DeepSeekV2-Lite</option>
            </select>
          </div>
          <div class="field">
            <label for="device_type">device_type</label>
            <select id="device_type">
              <option value="Ascend_910b2">ASCEND910B2</option>
              <option value="Ascend_910b3">ASCEND910B3</option>
              <option value="Ascend_910b4">ASCEND910B4</option>
              <option value="Ascend_A3Pod">ASCENDA3_Pod</option>
              <option value="Ascend_David121">ASCENDDAVID121</option>
              <option value="Ascend_David120">ASCENDDAVID120</option>
              <option value="Nvidia_A100_SXM">NvidiaA100SXM</option>
              <option value="Nvidia_H100_SXM">NvidiaH100SXM</option>
            </select>
          </div>
          <div class="field">
            <label>min_attn_bs</label>
            <input id="min_attn_bs" type="number" value="2" />
          </div>
          <div class="field">
            <label>max_attn_bs</label>
            <input id="max_attn_bs" type="number" value="1000" />
          </div>
          <div class="field">
            <label>min_die</label>
            <input id="min_die" type="number" value="16" />
          </div>
          <div class="field">
            <label>max_die</label>
            <input id="max_die" type="number" value="768" />
          </div>
          <div class="field">
            <label>die_step</label>
            <input id="die_step" type="number" value="16" />
          </div>
          <div class="field">
            <label>tpot (comma separated)</label>
            <input id="tpot" value="50" />
          </div>
          <div class="field">
            <label>kv_len (comma separated)</label>
            <input id="kv_len" value="4096" />
          </div>
          <div class="field">
            <label>micro_batch_num (comma separated)</label>
            <input id="micro_batch_num" value="3" />
          </div>
          <div class="field">
            <label>next_n</label>
            <input id="next_n" type="number" value="1" />
          </div>
          <div class="field">
            <label>multi_token_ratio</label>
            <input id="multi_token_ratio" type="number" value="0.7" step="0.01" />
          </div>
          <div class="field">
            <label>attn_tensor_parallel</label>
            <input id="attn_tensor_parallel" type="number" value="1" />
          </div>
          <div class="field">
            <label>ffn_tensor_parallel</label>
            <input id="ffn_tensor_parallel" type="number" value="1" />
          </div>
          <button id="run">Start Run</button>
        </div>
        <div id="status" style="margin-top:10px"></div>
    </div>

    <div id="config_box">
      <h2>Configuration</h2>
      <h3> Model Configuration</h3>
      <div id="model_config"></div>
      <h3> Hardware Configuration</h3>
      <div id="hardware_config"></div>
    </div>

    <div id="csv_results_box">
      <h2>Fetch CSV Results</h2>
        <div id="csv_results_container">
          <div class="form_field">
            <label for="results_model_type">model_type</label>
            <select id="results_model_type">
              <option value="DEEPSEEK_V3">DeepSeekV3</option>
              <option value="QWEN3_235B">Qwen3-235B-A22B</option>
              <option value="DEEPSEEK_V2_LITE">DeepSeekV2-Lite</option>
            </select>
          </div>

          <div class="form_field">
            <label for="results_device_type">device_type</label>
            <select id="results_device_type">
              <option value="ASCEND910B2">ASCEND910B2</option>
              <option value="ASCEND910B3">ASCEND910B3</option>
              <option value="ASCEND910B4">ASCEND910B4</option>
              <option value="ASCENDA3_Pod">ASCENDA3_Pod</option>
              <option value="ASCENDDAVID121">ASCENDDAVID121</option>
              <option value="ASCENDDAVID120">ASCENDDAVID120</option>
              <option value="NvidiaA100SXM">NvidiaA100SXM</option>
              <option value="NvidiaH100SXM">NvidiaH100SXM</option>
            </select>
          </div>

          <div class="form_field">
            <label for="results_tpot">TPOT:</label>
            <input id="results_tpot" type="number" value="50" />
          </div>

          <div class="form_field">
            <label for="results_kv_len">KV Length:</label>
            <input id="results_kv_len" type="number" value="4096" />
          </div>

          <div class="form_field">
            <label for="results_serving_mode">Serving Mode</label>
            <select id="results_serving_mode">
              <option value="AFD">AFD</option>
              <option value="DeepEP">DeepEP</option>
            </select>
          </div>

          <div class="form_field">
            <label for="results_micro_batch_num">Micro Batch Num</label>
            <input id="results_micro_batch_num" type="number" value="3"/>
          </div>

          <div class="form_field">
            <label for="results_total_die">Total Die:</label>
            <input id="results_total_die" type="number" value="128" />
          </div>

          <button id="fetch_results">Fetch Results</button>
        </div>
        <div id="results_table" style="margin-top:12px"></div>
    </div>
    <div id="throughput_box">
      <h2>throughput</h2>
        <div id="throughput_images"></div>
    </div>
    <div id="pipeline_box">
      <h2>pipeline</h2>
        <div id="pipeline_images"></div>
    </div>
  </div>

  <script>
  const apiBase = "/api";

  function parseList(s) {
    if (!s) return [];
    return s.split(",")
      .map(x => x.trim())
      .filter(x => x !== "")
      .map(x => {
        const n = Number(x);
        return Number.isNaN(n) ? x : n;
      });
  }

  async function fetchConstants() {
    try {
      const r = await fetch(`${apiBase}/constants`);
      if (r.ok) return await r.json();
    } catch (e) { console.error(e); }
    return {};
  }

  async function fetchConfigurations() {
    const modelType = document.getElementById("model_type").value;
    const deviceType = document.getElementById("device_type").value;
    try {
      const [modelResponse, hardwareResponse] = await Promise.all([
        fetch(`${apiBase}/model_config?model_type=${encodeURIComponent(modelType)}`),
        fetch(`${apiBase}/hardware_config?device_type=${encodeURIComponent(deviceType)}`)
      ]);
      if (modelResponse.ok && hardwareResponse.ok) {
        const modelConfig = await modelResponse.json();
        const hardwareConfig = await hardwareResponse.json();
        // render model config (subset)
        document.getElementById("model_config").innerHTML = `
          <p><strong>model_type:</strong> ${modelType}</p>
          <p><strong>hidden_size:</strong> ${modelConfig.hidden_size ?? 0}</p>
          <p><strong>num_layers:</strong> ${modelConfig.num_layers ?? 0}</p>
          <p><strong>max_kv_length:</strong> ${modelConfig.max_kv_length ?? 0}</p>
          <p><strong>num_attention_heads:</strong> ${modelConfig.num_attention_heads ?? modelConfig.num_heads ?? 0}</p>
          <p><strong>kv_heads:</strong> ${modelConfig.kv_heads ?? 0}</p>
          <p><strong>vocab_size:</strong> ${modelConfig.vocab_size ?? 0}</p>
          <p><strong>head_size:</strong> ${modelConfig.head_size ?? 0}</p>
          <p><strong>model_size_b:</strong> ${modelConfig.model_size_b ?? 0}</p>
          <p><strong>intermediate_size:</strong> ${modelConfig.intermediate_size ?? 0}</p>
          <p><strong>kv_lora_rank:</strong> ${modelConfig.kv_lora_rank ?? 0}</p>
          <p><strong>max_position_embeddings:</strong> ${modelConfig.max_position_embeddings ?? 0}</p>
          <p><strong>moe_intermediate_size:</strong> ${modelConfig.moe_intermediate_size ?? 0}</p>
          <p><strong>n_routed_experts:</strong> ${modelConfig.n_routed_experts ?? 0}</p>
          <p><strong>n_shared_experts:</strong> ${modelConfig.n_shared_experts ?? 0}</p>
          <p><strong>num_experts_per_tok:</strong> ${modelConfig.num_experts_per_tok ?? 0}</p>
          <p><strong>num_key_value_heads:</strong> ${modelConfig.num_key_value_heads ?? 0}</p>
          <p><strong>num_moe_layers:</strong> ${modelConfig.num_moe_layers ?? 0}</p>
          <p><strong>first_k_dense_replace:</strong> ${modelConfig.first_k_dense_replace ?? 0}</p>
          <p><strong>q_lora_rank:</strong> ${modelConfig.q_lora_rank ?? 0}</p>
          <p><strong>qk_nope_head_dim:</strong> ${modelConfig.qk_nope_head_dim ?? 0}</p>
          <p><strong>qk_rope_head_dim:</strong> ${modelConfig.qk_rope_head_dim ?? 0}</p>
          <p><strong>v_head_dim:</strong> ${modelConfig.v_head_dim ?? 0}</p>
        `;
        const constants = await fetchConstants();
        document.getElementById("hardware_config").innerHTML = `
          <p><strong>Device Type:</strong> ${deviceType}</p>
          <p><strong>num_dies_per_node:</strong> ${hardwareConfig.num_dies_per_node ?? ""}</p>
          <p><strong>HBM Capacity:</strong> ${hardwareConfig.aichip_memory ? (hardwareConfig.aichip_memory / (constants.GB_2_BYTE)).toFixed(2) + " GB" : ""}</p>
          <p><strong>Intra-node Bandwidth:</strong> ${hardwareConfig.intra_node_bandwidth ? (hardwareConfig.intra_node_bandwidth / (constants.GB_2_BYTE)).toFixed(2) + " GB/s" : ""}</p>
          <p><strong>Inter-node Bandwidth:</strong> ${hardwareConfig.inter_node_bandwidth ? (hardwareConfig.inter_node_bandwidth / (constants.GB_2_BYTE)).toFixed(2) + " GB/s" : ""}</p>
          <p><strong>Local Memory Bandwidth:</strong> ${hardwareConfig.local_memory_bandwidth ? (hardwareConfig.local_memory_bandwidth / (constants.TB_2_BYTE)).toFixed(2) + " TB/s" : ""}</p>
          <p><strong>BWSIO Memory Bandwidth:</strong> ${hardwareConfig.bwsio_memory_bandwidth ? (hardwareConfig.bwsio_memory_bandwidth / (constants.GB_2_BYTE)).toFixed(2) + " GB/s" : ""}</p>
          <p><strong>Onchip Buffer Size:</strong> ${hardwareConfig.onchip_buffer_size ? (hardwareConfig.onchip_buffer_size / (constants.MB_2_BYTE)).toFixed(2) + " MB" : ""}</p>
          <p><strong>Cube FLOPS FP16:</strong> ${hardwareConfig.cube_flops_fp16 ? (hardwareConfig.cube_flops_fp16 / (constants.TB_2_BYTE)).toFixed(2) + " TFLOPS" : ""}</p>
          <p><strong>Cube FLOPS INT8:</strong> ${hardwareConfig.cube_flops_int8 ? (hardwareConfig.cube_flops_int8 / (constants.TB_2_BYTE)).toFixed(2) + " TFLOPS" : ""}</p>
          <p><strong>Vector FLOPS FP16:</strong> ${hardwareConfig.vector_flops_fp16 ? (hardwareConfig.vector_flops_fp16 / (constants.TB_2_BYTE)).toFixed(2) + " TFLOPS" : ""}</p>
          <p><strong>Vector FLOPS INT8:</strong> ${hardwareConfig.vector_flops_int8 ? (hardwareConfig.vector_flops_int8 / (constants.TB_2_BYTE)).toFixed(2) + " TFLOPS" : ""}</p>
        `;
      } else {
        console.error("Failed to fetch configuration data", modelResponse.status, hardwareResponse.status);
      }
    } catch (e) { console.error(e); }
  }

  async function init() {
    await fetchConfigurations();
    document.getElementById("model_type").addEventListener("change", fetchConfigurations);
    document.getElementById("device_type").addEventListener("change", fetchConfigurations);

    document.getElementById("run").addEventListener("click", async () => {
      const payload = {
        serving_mode: document.getElementById("serving_mode").value,
        model_type: document.getElementById("model_type").value,
        device_type: document.getElementById("device_type").value,
        min_attn_bs: Number(document.getElementById("min_attn_bs").value),
        max_attn_bs: Number(document.getElementById("max_attn_bs").value),
        min_die: Number(document.getElementById("min_die").value),
        max_die: Number(document.getElementById("max_die").value),
        die_step: Number(document.getElementById("die_step").value),
        tpot: parseList(document.getElementById("tpot").value),
        kv_len: parseList(document.getElementById("kv_len").value),
        micro_batch_num: parseList(document.getElementById("micro_batch_num").value),
        next_n: Number(document.getElementById("next_n").value),
        multi_token_ratio: Number(document.getElementById("multi_token_ratio").value),
        attn_tensor_parallel: Number(document.getElementById("attn_tensor_parallel").value),
        ffn_tensor_parallel: Number(document.getElementById("ffn_tensor_parallel").value)
      };
      document.getElementById("status").innerText = "starting...";
      try {
        const resp = await fetch(`${apiBase}/run`, {
          method: "POST",
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        });
        const j = await resp.json();
        const runId = j.run_id;
        document.getElementById("status").innerText = "started: " + runId;
        poll(runId);
      } catch (err) {
        document.getElementById("status").innerText = "error: " + err;
      }
    });

    document.getElementById("fetch_results").addEventListener("click", async () => {
      const deviceType = document.getElementById("results_device_type").value;
      const modelType = document.getElementById("results_model_type").value;
      const tpot = Number(document.getElementById("results_tpot").value);
      const kvLen = Number(document.getElementById("results_kv_len").value);
      const servingMode = document.getElementById("results_serving_mode").value;
      const microBatchNum = Number(document.getElementById("results_micro_batch_num").value);
      const total_die = Number(document.getElementById("results_total_die").value);
      const url = `${apiBase}/fetch_csv_results?device_type=${encodeURIComponent(deviceType)}&model_type=${encodeURIComponent(modelType)}&tpot=${tpot}&kv_len=${kvLen}&serving_mode=${encodeURIComponent(servingMode)}&micro_batch_num=${microBatchNum}${total_die ? `&total_die=${total_die}` : ""}`;
      try {
        const r = await fetch(url);
        if (!r.ok) {
          const text = await r.text();
          document.getElementById("results_table").innerText = `Error: ${r.status} ${text}`;
          return;
        }
        const data = await r.json();
        displayResults(data);
      } catch (e) {
        console.error(e);
        document.getElementById("results_table").innerText = "Fetch failed";
      }
      showResults(deviceType, modelType, total_die, tpot, kvLen);
    });
  }

  function displayResults(data) {
    const resultsTable = document.getElementById("results_table");
    resultsTable.innerHTML = "";
    if (!data || data.length === 0) {
      resultsTable.innerHTML = "<p>No results found.</p>";
      return;
    }
    let table = "<table style='width: 100%; border-collapse: collapse;'>";
    table += "<thead><tr><th>Parameter</th><th>Value</th></tr></thead><tbody>";

    Object.entries(data[0]).forEach(([key, value]) => {
      table += `<tr><td>${key}</td><td>${value}</td></tr>`;
    });

    table += "</tbody></table>";
    resultsTable.innerHTML = table;
  }

  async function poll(runId) {
    document.getElementById("status").innerText = "running: " + runId;
    const interval = setInterval(async () => {
      try {
        const r = await fetch(`${apiBase}/status/${runId}`);
        const s = await r.json();
        document.getElementById("status").innerText = JSON.stringify(s);
        if (s.done) {
          clearInterval(interval);
          document.getElementById("status").innerText = "done";
        }
      } catch (e) {
        console.error(e);
      }
    }, 3000);
  }

  async function showResults(deviceType, modelType, total_die, tpot, kv_len) {
    try {
      const r = await fetch(`${apiBase}/results?device_type=${encodeURIComponent(deviceType)}&model_type=${encodeURIComponent(modelType)}&${total_die ? `&total_die=${total_die}` : ""}&${tpot ? `&tpot=${tpot}` : ""}&${kv_len ? `&kv_len=${kv_len}` : ""}`);
      const j = await r.json();
      const throughputImagesDiv = document.getElementById("throughput_images");
      const pipelineImagesDiv = document.getElementById("pipeline_images");
      throughputImagesDiv.innerHTML = "";
      pipelineImagesDiv.innerHTML = "";
      for (const url of j.throughput_images) {
        const card = document.createElement("div");
        card.className = "img-card";
        const placeholder = document.createElement("div");
        placeholder.className = "img-placeholder";
        placeholder.innerText = "Loading...";
        card.appendChild(placeholder);
        throughputImagesDiv.appendChild(card);

        await new Promise(resolve => {
          const img = new Image();
          img.src = url;
          img.onload = () => {
            card.innerHTML = "";
            img.className = "result-img";
            img.alt = `result image`;
            card.appendChild(img);
            resolve();
          };
          img.onerror = () => {
            card.innerHTML = "";
            const msg = document.createElement("div");
            msg.className = "img-missing";
            msg.innerHTML = `<div><strong>Image does not exist</strong></div><div class="img-url">${url}</div>`;
            card.appendChild(msg);
            console.error(`Image load failed: ${url}`);
            resolve();
          };
        });
      }
      for (const url of j.pipeline_images) {
        const card = document.createElement("div");
        card.className = "img-card";
        const placeholder = document.createElement("div");
        placeholder.className = "img-placeholder";
        placeholder.innerText = "Loading...";
        card.appendChild(placeholder);
        pipelineImagesDiv.appendChild(card);

        await new Promise(resolve => {
          const img = new Image();
          img.src = url;
          img.onload = () => {
            card.innerHTML = "";
            img.className = "result-img";
            img.alt = `result image`;
            card.appendChild(img);
            resolve();
          };
          img.onerror = () => {
            card.innerHTML = "";
            const msg = document.createElement("div");
            msg.className = "img-missing";
            msg.innerHTML = `<div><strong>Image does not exist</strong></div><div class="img-url">${url}</div>`;
            card.appendChild(msg);
            console.error(`Image load failed: ${url}`);
            resolve();
          };
        });
      }
    } catch (e) {
      console.error(e);
    }
  }

  window.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
